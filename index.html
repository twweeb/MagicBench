<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="icon" href="/favicon.ico"/><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#000000"/><link rel="manifest" href="/MagicBench/manifest.json"/><title>MagicBench: A Deception-Sensitive Cognitive Benchmark for LLMs</title><meta name="description" content="Current large language model (LLM) benchmarks predominantly evaluate reasoning in cooperative, fully observable settings, leaving critical gaps in assessing performance under adversarial information manipulation, partial observability, and social deception. We introduce MagicBench, a deception-sensitive cognitive benchmark that leverages magic-trick understanding as an adversarial probe for LLM cognition. Magic tricks are uniquely suited for this purpose: they are observer-dependent stimuli in which a performer deliberately manipulates attention, memory, and inference to induce false beliefs, requiring the observer to integrate causal reasoning, theory of mind, metacognitive calibration, and counterfactual analysis to understand the underlying method. MagicBench comprises 50 scenarios spanning 10 effect types, each generating 6 task types (300 tasks total) that map onto a weighted scoring framework. Each scenario is annotated with 5 difficulty axes (perceptual complexity, hidden steps, social context dependence, theory-of-mind need, and counterfactual demand) and per-task cognitive faculty tags, enabling fine-grained diagnostic profiles. MagicBench targets the evaluation gaps most emphasized by recent AGI frameworks — attention, metacognition, social cognition, and executive functions — and is designed to reveal the jagged capability profiles that single-score benchmarks obscure."><meta name="citation_title" content="MagicBench: A Deception-Sensitive Cognitive Benchmark for LLMs"><meta name="citation_author" content="Lei Hsiung"><meta name="citation_date" content="2026/04/16"><meta name="citation_p
